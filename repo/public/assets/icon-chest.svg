<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel chest/treasure icon -->
  <!-- lid -->
  <rect x="1" y="3" width="14" height="1" fill="#8a6040"/>
  <rect x="1" y="4" width="14" height="1" fill="#a87850"/>
  <rect x="1" y="5" width="14" height="1" fill="#c8a870"/>
  <rect x="1" y="6" width="14" height="1" fill="#a87850"/>
  <!-- body -->
  <rect x="1" y="7" width="14" height="1" fill="#5a3820"/>
  <rect x="1" y="8" width="14" height="1" fill="#8a6040"/>
  <rect x="1" y="9" width="14" height="1" fill="#8a6040"/>
  <rect x="1" y="10" width="14" height="1" fill="#8a6040"/>
  <rect x="1" y="11" width="14" height="1" fill="#8a6040"/>
  <rect x="1" y="12" width="14" height="1" fill="#5a3820"/>
  <!-- borders -->
  <rect x="0" y="3" width="1" height="10" fill="#5a3820"/>
  <rect x="15" y="3" width="1" height="10" fill="#5a3820"/>
  <rect x="1" y="2" width="14" height="1" fill="#5a3820"/>
  <rect x="1" y="13" width="14" height="1" fill="#3a1808"/>
  <!-- gold stripe -->
  <rect x="1" y="7" width="14" height="1" fill="#ffd700"/>
  <!-- lock -->
  <rect x="6" y="8" width="4" height="3" fill="#c8a020"/>
  <rect x="7" y="7" width="2" height="1" fill="#c8a020"/>
  <rect x="7" y="9" width="2" height="1" fill="#8a6800"/>
  <!-- shine -->
  <rect x="2" y="4" width="3" height="1" fill="#e8d890"/>
</svg>
