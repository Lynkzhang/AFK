  <rect x="7" y="2" width="2" height="1" fill="#d8e0f0"/>
  <rect x="7" y="3" width="2" height="1" fill="#d8e0f0"/>
  <rect x="7" y="4" width="2" height="1" fill="#d8e0f0"/>
  <rect x="7" y="5" width="2" height="1" fill="#d8e0f0"/>
  <rect x="7" y="6" width="2" height="1" fill="#d8e0f0"/>
  <rect x="7" y="7" width="2" height="1" fill="#c0c8d8"/>
