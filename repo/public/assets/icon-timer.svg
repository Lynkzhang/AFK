<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel timer/clock icon -->
  <!-- outer circle -->
  <rect x="3" y="1" width="10" height="1" fill="#c8b090"/>
  <rect x="1" y="3" width="14" height="1" fill="#c8b090"/>
  <rect x="1" y="11" width="14" height="1" fill="#c8b090"/>
  <rect x="3" y="13" width="10" height="1" fill="#c8b090"/>
  <rect x="1" y="4" width="1" height="7" fill="#c8b090"/>
  <rect x="14" y="4" width="1" height="7" fill="#c8b090"/>
  <rect x="2" y="2" width="1" height="1" fill="#c8b090"/>
  <rect x="13" y="2" width="1" height="1" fill="#c8b090"/>
  <rect x="2" y="12" width="1" height="1" fill="#c8b090"/>
  <rect x="13" y="12" width="1" height="1" fill="#c8b090"/>
  <!-- fill -->
  <rect x="2" y="3" width="12" height="9" fill="#1a1824"/>
  <rect x="3" y="2" width="10" height="1" fill="#1a1824"/>
  <rect x="3" y="12" width="10" height="1" fill="#1a1824"/>
  <!-- clock hands -->
  <rect x="7" y="4" width="2" height="1" fill="#ffd700"/>
  <rect x="7" y="5" width="1" height="2" fill="#ffd700"/>
  <rect x="8" y="7" width="3" height="1" fill="#56d364"/>
  <!-- center dot -->
  <rect x="7" y="7" width="2" height="1" fill="#fff"/>
  <!-- top notch -->
  <rect x="6" y="0" width="4" height="1" fill="#8a7060"/>
  <rect x="5" y="1" width="1" height="1" fill="#8a7060"/>
  <rect x="10" y="1" width="1" height="1" fill="#8a7060"/>
</svg>
